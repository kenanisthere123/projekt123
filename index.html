<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Informatik Grundwissen Quiz</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #0d1117;
            color: #e6edf3;
            display: flex;
            justify-content: center;
            padding: 40px;
        }

        .quiz-container {
            width: 100%;
            max-width: 550px;
            background: #161b22;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 0 25px rgba(255,255,255,0.08);
        }

        .btn-grid {
            display: grid;
            gap: 12px;
            margin-top: 20px;
        }

        button {
            padding: 12px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 1em;
            transition: 0.2s;
        }

        .answer-btn {
            background: #238636;
            color: white;
        }

        .answer-btn:hover {
            background: #2ea043;
        }

        .correct {
            background: #2ea043 !important;
        }

        .wrong {
            background: #da3633 !important;
        }

        .next-btn {
            margin-top: 20px;
            background: #0969da;
            color: white;
            display: none;
        }

        .result {
            margin-top: 20px;
            font-size: 1.2em;
            text-align: center;
        }
    </style>
</head>

<body>
    <div class="quiz-container">
        <h1>Informatik Grundwissen Quiz</h1>

        <div id="question-container">
            <h2 id="question"></h2>
            <div id="answer-buttons" class="btn-grid"></div>
        </div>

        <button id="next-btn" class="next-btn">Weiter</button>
        <div id="result" class="result"></div>
    </div>

    <script>
        const questions = [
            // Sehr einfach
            { question: "Was ist ein Computer?", answers: [
                { text: "Eine Maschine, die Daten verarbeitet", correct: true },
                { text: "Ein Auto", correct: false },
                { text: "Ein Kühlschrank", correct: false },
                { text: "Ein Telefonbuch", correct: false }
            ]},
            { question: "Was ist eine Maus?", answers: [
                { text: "Ein Eingabegerät", correct: true },
                { text: "Ein Ausgabegerät", correct: false },
                { text: "Ein Programm", correct: false },
                { text: "Ein Kabel", correct: false }
            ]},
            { question: "Was ist ein Monitor?", answers: [
                { text: "Ein Bildschirm", correct: true },
                { text: "Eine Tastatur", correct: false },
                { text: "Ein Lautsprecher", correct: false },
                { text: "Ein Router", correct: false }
            ]},
            { question: "Was ist eine App?", answers: [
                { text: "Ein kleines Programm", correct: true },
                { text: "Ein Kabel", correct: false },
                { text: "Ein Ordner", correct: false },
                { text: "Ein Passwort", correct: false }
            ]},
            { question: "Was ist ein Passwort?", answers: [
                { text: "Ein geheimer Zugangscode", correct: true },
                { text: "Ein Bild", correct: false },
                { text: "Ein Gerät", correct: false },
                { text: "Ein Ordner", correct: false }
            ]},

            // Einfach
            { question: "Wofür steht USB?", answers: [
                { text: "Universal Serial Bus", correct: true },
                { text: "Ultra Speed Box", correct: false },
                { text: "United System Base", correct: false },
                { text: "Universal Software Bridge", correct: false }
            ]},
            { question: "Was speichert Daten dauerhaft?", answers: [
                { text: "Festplatte (HDD/SSD)", correct: true },
                { text: "RAM", correct: false },
                { text: "CPU", correct: false },
                { text: "Maus", correct: false }
            ]},
            { question: "Was ist ein Browser?", answers: [
                { text: "Ein Programm zum Surfen im Internet", correct: true },
                { text: "Ein Computer", correct: false },
                { text: "Ein Kabel", correct: false },
                { text: "Ein Drucker", correct: false }
            ]},
            { question: "Was ist WLAN?", answers: [
                { text: "Drahtloses Netzwerk", correct: true },
                { text: "Ein Kabel", correct: false },
                { text: "Ein Computer", correct: false },
                { text: "Ein Programm", correct: false }
            ]},
            { question: "Was ist das Internet?", answers: [
                { text: "Ein weltweites Netzwerk", correct: true },
                { text: "Ein Computerspiel", correct: false },
                { text: "Ein Programm", correct: false },
                { text: "Ein Kabel", correct: false }
            ]},

            // Mittel
            { question: "Wofür steht CPU?", answers: [
                { text: "Central Processing Unit", correct: true },
                { text: "Computer Power Unit", correct: false },
                { text: "Central Program Utility", correct: false },
                { text: "Control Processing User", correct: false }
            ]},
            { question: "Was macht der RAM?", answers: [
                { text: "Speichert Daten kurzfristig", correct: true },
                { text: "Speichert Daten dauerhaft", correct: false },
                { text: "Verbindet Geräte", correct: false },
                { text: "Zeigt Bilder an", correct: false }
            ]},
            { question: "Was ist ein Betriebssystem?", answers: [
                { text: "Die Software, die den Computer steuert", correct: true },
                { text: "Ein Kabel", correct: false },
                { text: "Ein Lautsprecher", correct: false },
                { text: "Ein Browser", correct: false }
            ]},
            { question: "Was ist eine Datei?", answers: [
                { text: "Eine gespeicherte Information", correct: true },
                { text: "Ein Gerät", correct: false },
                { text: "Ein Passwort", correct: false },
                { text: "Ein Kabel", correct: false }
            ]},
            { question: "Was ist eine Programmiersprache?", answers: [
                { text: "Eine Sprache, um Computerprogramme zu schreiben", correct: true },
                { text: "Eine Sprache für Menschen", correct: false },
                { text: "Ein Gerät", correct: false },
                { text: "Ein Netzwerk", correct: false }
            ]},

            // Schwer
            { question: "Was ist ein Algorithmus?", answers: [
                { text: "Eine Schritt-für-Schritt-Anleitung", correct: true },
                { text: "Ein Gerät", correct: false },
                { text: "Ein Kabel", correct: false },
                { text: "Ein Passwort", correct: false }
            ]},
            { question: "Was ist eine IP-Adresse?", answers: [
                { text: "Eine eindeutige Adresse im Netzwerk", correct: true },
                { text: "Ein Passwort", correct: false },
                { text: "Ein Programm", correct: false },
                { text: "Ein Gerät", correct: false }
            ]},
            { question: "Was ist ein Server?", answers: [
                { text: "Ein Computer, der Dienste bereitstellt", correct: true },
                { text: "Ein Kabel", correct: false },
                { text: "Ein Browser", correct: false },
                { text: "Ein Passwort", correct: false }
            ]},
            { question: "Was ist eine Datenbank?", answers: [
                { text: "Ein System zur Speicherung von Daten", correct: true },
                { text: "Ein Kabel", correct: false },
                { text: "Ein Gerät", correct: false },
                { text: "Ein Browser", correct: false }
            ]},
            { question: "Was ist ein Netzwerkprotokoll?", answers: [
                { text: "Eine Regel für die Kommunikation im Netzwerk", correct: true },
                { text: "Ein Gerät", correct: false },
                { text: "Ein Passwort", correct: false },
                { text: "Ein Kabel", correct: false }
            ]},

            // Sehr schwer
            { question: "Was ist ein Compiler?", answers: [
                { text: "Ein Programm, das Code übersetzt", correct: true },
                { text: "Ein Kabel", correct: false },
                { text: "Ein Gerät", correct: false },
                { text: "Ein Passwort", correct: false }
            ]},
            { question: "Was ist das Binärsystem?", answers: [
                { text: "Ein Zahlensystem mit 0 und 1", correct: true },
                { text: "Ein System mit 10 Zahlen", correct: false },
                { text: "Ein Netzwerk", correct: false },
                { text: "Ein Gerät", correct: false }
            ]},
            { question: "Was bedeutet Open Source?", answers: [
                { text: "Der Quellcode ist öffentlich", correct: true },
                { text: "Der Code ist geheim", correct: false },
                { text: "Es ist ein Gerät", correct: false },
                { text: "Es ist ein Kabel", correct: false }
            ]},
            { question: "Was ist ein Kernel?", answers: [
                { text: "Der Kern eines Betriebssystems", correct: true },
                { text: "Ein Gerät", correct: false },
                { text: "Ein Browser", correct: false },
                { text: "Ein Passwort", correct: false }
            ]},
            { question: "Was ist ein Hash-Wert?", answers: [
                { text: "Eine eindeutige Zeichenfolge aus Daten", correct: true },
                { text: "Ein Passwort", correct: false },
                { text: "Ein Gerät", correct: false },
                { text: "Ein Kabel", correct: false }
            ]}
        ];

        const questionElement = document.getElementById("question");
        const answerButtons = document.getElementById("answer-buttons");
        const nextButton = document.getElementById("next-btn");
        const resultElement = document.getElementById("result");

        let currentQuestionIndex = 0;
        let score = 0;

        function startQuiz() {
            currentQuestionIndex = 0;
            score = 0;
            nextButton.style.display = "none";
            resultElement.innerHTML = "";
            showQuestion();
        }

        function showQuestion() {
            resetState();
            let currentQuestion = questions[currentQuestionIndex];
            questionElement.innerText = currentQuestion.question;

            currentQuestion.answers.forEach(answer => {
                const button = document.createElement("button");
                button.innerText = answer.text;
                button.classList.add("answer-btn");
                button.addEventListener("click", () => selectAnswer(button, answer));
                answerButtons.appendChild(button);
            });
        }

        function resetState() {
            nextButton.style.display = "none";
            answerButtons.innerHTML = "";
        }

        function selectAnswer(button, answer) {
            const buttons = answerButtons.querySelectorAll("button");
            buttons.forEach(btn => btn.disabled = true);

            if (answer.correct) {
                button.classList.add("correct");
                score++;
            } else {
                button.classList.add("wrong");
            }

            nextButton.style.display = "block";
        }

        nextButton.addEventListener("click", () => {
            currentQuestionIndex++;
            if (currentQuestionIndex < questions.length) {
                showQuestion();
            } else {
                showResult();
            }
        });

        function showResult() {
            resetState();
            questionElement.innerText = "Quiz beendet!";
            resultElement.innerHTML = `🎉 Du hast <strong>${score}</strong> von <strong>${questions.length}</strong> Fragen richtig beantwortet.`;
        }

        startQuiz();
    </script>
</body>
</html>
